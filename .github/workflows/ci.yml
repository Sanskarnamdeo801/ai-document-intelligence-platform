name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: document_intelligence_db
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d document_intelligence_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Enable vector extension
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d document_intelligence_db -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/document_intelligence_db
          UPLOAD_DIR: ./test_uploads
          LOG_DIR: ./test_logs
        run: pytest tests/

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build
